<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Cascade</title>
  <meta name="apple-itunes-app" content="app-id=6761320124, app-argument=cascade://join/CODE_PLACEHOLDER" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      color: #fff;
      padding: 32px 24px;
    }
    .card {
      max-width: 340px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #1fc98e, #0a7a52);
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }
    p {
      font-size: 15px;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
      margin-bottom: 36px;
    }
    .btn-primary {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      background: #fff;
      color: #000;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 12px;
      cursor: pointer;
      border: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-secondary {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      border: none;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🌿</div>
    <h1>You're invited to Cascade</h1>
    <p>Your friend wants you to join them on Cascade — the focus app that actually works.</p>

    <a class="btn-primary" href="https://apps.apple.com/app/id6761320124">
      Download on the App Store
    </a>
  </div>

  <script>
    var pathParts = window.location.pathname.split('/').filter(Boolean);
    var code = pathParts[pathParts.length - 1] || '';

    // Update Smart App Banner with real code
    if (code) {
      var banner = document.querySelector('meta[name="apple-itunes-app"]');
      if (banner) {
        banner.setAttribute('content', 'app-id=6761320124, app-argument=cascade://join/' + code);
      }

    }
  </script>
</body>
</html>
