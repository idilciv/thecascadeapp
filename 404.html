<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening Cascade…</title>

  <!--
    Smart App Banner — iOS shows a native "Open in Cascade" banner at the top of Safari.
    App Store ID: 6761320124
  -->
  <meta name="apple-itunes-app" content="app-id=6761320124, app-argument=cascade://join/CODE_PLACEHOLDER" />

  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      color: #fff;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 360px;
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p  { font-size: 15px; color: rgba(255,255,255,0.6); margin-bottom: 32px; }
    a.btn {
      display: inline-block;
      padding: 14px 32px;
      border-radius: 50px;
      background: #fff;
      color: #000;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Opening Cascade…</h1>
    <p>If Cascade doesn't open automatically, get it on the App Store.</p>
    <a class="btn" id="storeBtn" href="https://apps.apple.com/app/id6761320124">
      Get Cascade
    </a>
  </div>

  <script>
    // Extract the invite code from the path, e.g. /ABC123 → "ABC123"
    var pathParts = window.location.pathname.split('/').filter(Boolean);
    var code = pathParts[pathParts.length - 1] || '';

    // Update Smart App Banner app-argument with the real code
    var bannerMeta = document.querySelector('meta[name="apple-itunes-app"]');
    if (bannerMeta && code) {
      bannerMeta.setAttribute(
        'content',
        'app-id=6761320124, app-argument=cascade://join/' + code
      );
    }

    // Try to open the app via custom URL scheme (works if app is installed)
    if (code) {
      window.location.href = 'cascade://join/' + code;
    }

    // After a short delay, if the page is still visible the app wasn't installed —
    // redirect to App Store.
    var storeUrl = 'https://apps.apple.com/app/id6761320124';
    document.getElementById('storeBtn').href = storeUrl;

    var redirectTimer = setTimeout(function () {
      window.location.href = storeUrl;
    }, 1500);

    // If the user comes back to this tab (app opened), cancel the redirect.
    window.addEventListener('pagehide', function () { clearTimeout(redirectTimer); });
    document.addEventListener('visibilitychange', function () {
      if (document.hidden) clearTimeout(redirectTimer);
    });
  </script>
</body>
</html>
