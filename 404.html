<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<meta name="robots" content="noindex" />

<link rel="icon" type="image/png" href="/assets/cascade-icon-rounded.png" />
<link rel="apple-touch-icon" href="/assets/cascade-icon.png" />
<style>
  :root{--zen:#19d194;--vault:#26b6cc;--bg:#08080b;--text:#f4f5f7;--muted:#a7adb8;--border:rgba(255,255,255,.08)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;overflow:hidden;position:relative}
  .glow{position:absolute;top:-10%;left:50%;transform:translateX(-50%);width:760px;height:760px;border-radius:50%;background:radial-gradient(circle,rgba(25,209,148,.12),transparent 60%);pointer-events:none}
  .wrap{position:relative;z-index:1;max-width:460px}
  .logo{display:inline-flex;align-items:center;gap:11px;text-decoration:none;color:var(--text);margin-bottom:34px}
  .logo .mark{width:34px;height:34px;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:#000}
  .logo .mark img{width:100%;height:100%;object-fit:cover;display:block}
  .logo b{font-size:19px;font-weight:800;letter-spacing:-.02em}
  .code{font-size:96px;font-weight:800;letter-spacing:-.04em;line-height:1;background:linear-gradient(90deg,var(--zen),var(--vault));-webkit-background-clip:text;background-clip:text;color:transparent}
  h1{font-size:24px;margin:14px 0 8px;letter-spacing:-.01em}
  p{color:var(--muted);font-size:16px;margin-bottom:30px}
  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:650;font-size:15px;border-radius:100px;padding:12px 24px;background:var(--text);color:#0a0a0a;text-decoration:none;transition:.25s}
  .btn:hover{transform:translateY(-1px);box-shadow:0 12px 30px rgba(255,255,255,.14)}
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="wrap">
    <a href="/" class="logo"><span class="mark"><img src="/assets/cascade-icon-rounded.png" alt="Cascade logo"></span><b>Cascade</b></a>
    <div class="code">404</div>
    <h1>This page wandered off.</h1>
    <p>The link may be broken or the page may have moved. Let's get you back on track.</p>
    <a href="/" class="btn">← Back to home</a>
  </div>
</body>
