<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening Cascade…</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #06060a;
      color: #f0eeec;
      font-family: 'DM Sans', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .wrap { max-width: 320px; }
    .logo {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      opacity: 0.8;
    }
    p {
      font-size: 0.95rem;
      color: rgba(240,238,236,0.45);
      line-height: 1.65;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      background: #f0eeec;
      color: #06060a;
      padding: 0.85rem 2rem;
      border-radius: 100px;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Cascade</div>
    <p>Opening the app…<br>If nothing happens, get Cascade on the App Store.</p>
    <a class="btn" href="https://apps.apple.com/app/id6761320124">Download on the App Store</a>
  </div>
  <script>
    // Extract friend code from path e.g. /ABC123
    var code = window.location.pathname.replace(/\//g, '').trim().toUpperCase();

    if (code && code.length === 6) {
      // Try custom URL scheme (works if app is installed but Universal Links missed)
      window.location.href = 'cascade://join/' + code;
      // Fallback: App Store after 1.5s
      setTimeout(function() {
        window.location.href = 'https://apps.apple.com/app/id6761320124';
      }, 1500);
    } else {
      // No valid code — go straight to App Store
      window.location.href = 'https://apps.apple.com/app/id6761320124';
    }
  </script>
</body>
</html>
