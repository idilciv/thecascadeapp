<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: transparent; overflow: hidden; width: 100%; height: 100%; }
spline-viewer { width: 100%; height: 100%; --background-color: transparent; }
</style>
</head>
<body>
<script type="module" src="spline-viewer.js"></script>
<spline-viewer
  url="zen_mode.splinecode"
  background="transparent">
</spline-viewer>
<script>
  (function(){
    var viewer = document.querySelector('spline-viewer');
    var app = null, pending = 90, sun = null, pendingColor = null;
    var softGoldenHex = 0xD4A574; // hafif sarı/darı
    function apply(){ if (app) { try { app.setVariable('sessionProgress', pending); } catch(e){} } }
    function applyColor(){
      if (sun) {
        try { sun.color = softGoldenHex; } catch(e){}
        try { sun.color = '#' + softGoldenHex.toString(16).padStart(6, '0'); } catch(e){}
        try { sun.intensity = 7; } catch(e){}
        try { sun.castShadow = true; } catch(e){}
        try { if (sun.light) sun.light.intensity = 7; } catch(e){}
      }
    }
    var iv = setInterval(function(){
      if (!app && viewer._spline && typeof viewer._spline.setVariable === 'function') { app = viewer._spline; }
      if (app) {
        apply();
        if (!sun && typeof app.findObjectByName === 'function') {
          try { var s = app.findObjectByName('sunLight'); if (s) { sun = s; applyColor(); } } catch(e){}
          if (!sun) {
            try {
              if (typeof app.getAllObjects === 'function') {
                var all = app.getAllObjects();
                for (var j = 0; j < all.length && !sun; j++) {
                  var nm = (all[j].name || '').toLowerCase();
                  if (nm.indexOf('sun') !== -1 && nm.indexOf('light') !== -1) sun = all[j];
                }
                for (var k = 0; k < all.length && !sun; k++) {
                  var nm2 = (all[k].name || '').toLowerCase();
                  if (nm2.indexOf('directional') !== -1) sun = all[k];
                }
                if (sun) applyColor();
              }
            } catch(e){}
          }
          try {
            ['sun','Sun','sunDisc','Sun Disc','sunGlow','Glow','glow','SunCore'].forEach(function(n){
              var o = app.findObjectByName(n);
              if (o) {
                try { if (o.scale) { o.scale.x *= 1.5; o.scale.y *= 1.5; o.scale.z *= 1.5; } } catch(e){}
                try { o.emissiveIntensity = 0.35; } catch(e){}
                try { o.opacity = 0.7; } catch(e){}
              }
            });
          } catch(e){}
          if (sun) clearInterval(iv);
        }
      }
    }, 200);
    function restrictRotation(){
      if (app && app.orbitControls) {
        try {
          app.orbitControls.rotationHorizontalOffset = { min: Math.PI/4 * -1, max: Math.PI/4 };
          app.orbitControls.autoRotate = false;
        } catch(e){}
      }
    }
    window.cascadeSetProgress = function(v){ pending = v; apply(); };
    window.cascadeSetSunColor = function(hex){ pendingColor = hex; };
    setTimeout(function(){ restrictRotation(); }, 500);
  })();
</script>
</body>
</html>
